<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weather-box">
            <h1>Weather Dashboard</h1>
            <form id="weather-form">
                <input type="text" id="city-input" placeholder="Enter City Name..." required>
                <button type="submit" id="submit">Search</button>
            </form>

            <div class="display-card" id="weather-result" style="display: none;">
                <h2 id="city-name">City</h2>
                <div class="temp-container">
                    <span id="temperature">--</span><span class="unit">°C</span>
                </div>
                <p id="description">Description</p>
                <div class="extra-info">
                    <span>Humidity: <b id="humidity">--</b>%</span>
                    <span>Wind: <b id="wind">--</b> km/h</span>
                </div>
            </div>

            <p id="error-message" style="color: #ffcccb; margin-top: 10px; display: none;">City not found. Try again!
            </p>
        </div>
    </div>
    <script src="index.js">
    </script>
</body>

</html>
