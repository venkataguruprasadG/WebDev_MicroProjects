<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
        }

        .content {
            text-align: center;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            padding: 20px;
        }

        .content h1 {
            font-size: 4em;
        }

        .clock {
            font-size: 3em;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="content">
        <h1>Digital Clock</h1>
        <div class="clock">
            <div class="time" id="time">

            </div>
        </div>
    </div>
    <script>
        const timeElement = document.getElementById('time');

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            if (hours < 10) {
                hours = '0' + hours;
            }
            let minutes = now.getMinutes();
            if (minutes < 10) {
                minutes = '0' + minutes;
            }
            let seconds = now.getSeconds();
            if (seconds < 10) {
                seconds = '0' + seconds;
            }
            const formattedTime = `${hours}:${minutes}:${seconds}:${hours > 12 ? 'PM' : 'AM'}`;
            timeElement.innerText = formattedTime;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
