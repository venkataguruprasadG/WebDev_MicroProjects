<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Task App</title>
    <style>
        body {
            display: flex;
            margin: 0;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            border: 1px solid black;
            background-color: rgb(255, 234, 214);
            border-radius: 2px;
            padding: 20px;
        }

        .my-tasks {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #task-input {
            padding: 5px;
            border-radius: 5px;
            border: 2px solid black;
        }

        #add-btn {
            border: 2px solid black;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: yellow;
            margin-bottom: 5px;
            padding: 10px;
            display: flex;
            /* Make the li a flex container */
            justify-content: space-between;
            /* Push text to left, button to right */
            align-items: center;
            /* Keep them aligned in the middle */
            border: 1px solid #ccc;
        }

        li button {
            background-color: #ff4d4d;
            /* Red for delete */
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="my-tasks">
            <h1>My Tasks</h1>
            <input type="text" id="task-input" placeholder="Type a task">
            <button id="add-btn">Add Task</button>
        </div>
        <div class="task-area">
            <ul id="task-list">
            </ul>
        </div>
    </div>
    <script>
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');

        addBtn.addEventListener('click', function () {
            if (taskInput.value !== "") {
                const newTask = document.createElement('li');
                newTask.innerText = taskInput.value + " ";

                const delBtn = document.createElement('button');
                delBtn.innerText = "Delete";

                delBtn.addEventListener('click', function () {
                    newTask.remove();
                })
                newTask.appendChild(delBtn);
                taskList.appendChild(newTask);

                taskInput.value = "";
            }
            else {
                alert("please enter something.")
            }
        });
    </script>
</body>

</html>
